<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | StudyNest Professional</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #2a5cff;
        --primary-hover: #1e46d6;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --glass-bg: rgba(255, 255, 255, 0.85);
        --text-dark: #1a202c;
        --text-gray: #718096;
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--bg-gradient);
        overflow: hidden;
        position: relative;
      }

      /* --- Animated Background Elements --- */
      .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        animation: float 20s infinite alternate;
      }
      .circle-1 {
        width: 400px;
        height: 400px;
        background: rgba(42, 92, 255, 0.2);
        top: -100px;
        left: -100px;
      }
      .circle-2 {
        width: 300px;
        height: 300px;
        background: rgba(0, 210, 255, 0.2);
        bottom: -50px;
        right: -50px;
        animation-delay: -5s;
      }

      @keyframes float {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(100px, 50px);
        }
      }

      /* --- Main Login Card --- */
      .login-card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        width: 100%;
        max-width: 420px;
        padding: 50px 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-area {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0;
        color: var(--text-dark);
        font-weight: 800;
        letter-spacing: -1px;
      }

      .subtitle {
        color: var(--text-gray);
        margin-bottom: 35px;
        font-size: 0.95rem;
      }

      /* --- Social Buttons --- */
      .social-container {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
      }

      .social-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: white;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
      }

      .social-btn:hover {
        background: #f8fafc;
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
      }

      .social-btn img {
        width: 18px;
      }

      .divider {
        position: relative;
        margin: 25px 0;
        border-bottom: 1px solid #e2e8f0;
      }

      .divider span {
        position: absolute;
        background: white;
        padding: 0 15px;
        font-size: 0.75rem;
        color: var(--text-gray);
        font-weight: 700;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 10px;
      }

      /* --- Form Styling --- */
      .form-group {
        text-align: left;
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-gray);
        margin-bottom: 8px;
        margin-left: 5px;
      }

      input {
        width: 100%;
        padding: 15px;
        border-radius: 14px;
        border: 2px solid #edf2f7;
        background: #f8fafc;
        font-size: 1rem;
        transition: 0.3s;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(42, 92, 255, 0.1);
      }

      .btn-login {
        width: 100%;
        padding: 16px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #2a5cff 0%, #00d2ff 100%);
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(42, 92, 255, 0.2);
        transition: 0.3s;
        margin-top: 10px;
      }

      .btn-login:hover {
        transform: scale(1.02);
        filter: brightness(1.05);
      }

      .footer-text {
        margin-top: 30px;
        font-size: 0.9rem;
        color: var(--text-gray);
      }

      .footer-text a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="login-card">
      <div class="logo-area">🎓</div>
      <h2>StudyNest</h2>
      <p class="subtitle">Enter your details to access your lessons</p>

      <div class="social-container">
        <button class="social-btn">
          <img
            src="https://img.icons8.com/color/48/000000/google-logo.png"
            alt="Google"
          />
          Google
        </button>
        <button class="social-btn">
          <img
            src="https://img.icons8.com/ios-filled/50/000000/facebook-new.png"
            alt="Facebook"
          />
          Facebook
        </button>
      </div>

      <div class="divider">
        <span>OR LOGIN WITH EMAIL</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input
            type="email"
            id="email"
            placeholder="e.g. student@studynest.com"
            required
          />
        </div>

        <div class="form-group">
          <label>PASSWORD</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="footer-text">
        Don't have an account? <a href="register.html">Create one for free</a>
      </div>
    </div>

    <script>
      // This makes the button actually DO something when clicked
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Stop page refresh

          // For now, it just takes you to the dashboard
          alert("Login Successful! Redirecting to your Dashboard...");
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
