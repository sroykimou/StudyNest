<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | StudyNest</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #4f46e5;
        --primary-glow: rgba(79, 70, 229, 0.45);
        --primary-light: #6c63ff;
        --accent: #74ebd5;
        --accent-glow: rgba(116, 235, 213, 0.35);
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.22);
        --input-bg: rgba(255, 255, 255, 0.08);
        --input-border: rgba(255, 255, 255, 0.2);
        --input-focus: rgba(116, 235, 213, 0.75);
        --text-primary: #f0f4ff;
        --text-muted: rgba(210, 220, 255, 0.65);
      }

      body {
        font-family: "Kantumruy Pro", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 25% 35%, #312e81 0%, transparent 55%),
          radial-gradient(ellipse at 75% 65%, #0f766e 0%, transparent 55%),
          linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #134e4a 100%);
      }

      /* ── Animated particles ── */
      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        animation: drift linear infinite;
        opacity: 0;
      }
      @keyframes drift {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      /* ── Rain drops (top→down) ── */
      .drops {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .drop {
        position: absolute;
        border-radius: 50% 50% 60% 60%;
        background: rgba(116, 235, 213, 0.15);
        animation: fall linear infinite;
      }
      @keyframes fall {
        0% {
          transform: translateY(-20px);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(100vh);
          opacity: 0;
        }
      }

      /* ── Card ── */
      .card {
        position: relative;
        width: 380px;
        padding: 48px 40px 40px;
        border-radius: 28px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(24px) saturate(1.6);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 40px 80px rgba(0, 0, 0, 0.55),
          0 0 60px rgba(79, 70, 229, 0.12),
          0 0 60px rgba(116, 235, 213, 0.07);
        animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          transparent 55%
        );
        pointer-events: none;
      }

      /* ── Logo ── */
      .logo-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
        animation: fadeUp 0.75s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .logo-icon {
        width: 62px;
        height: 62px;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--accent) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #fff;
        box-shadow:
          0 0 28px var(--primary-glow),
          0 0 14px var(--accent-glow);
      }

      /* ── Headings ── */
      .brand {
        font-family: "Rajdhani", sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--text-primary);
        text-align: center;
        letter-spacing: 1px;
        margin-bottom: 4px;
        animation: fadeUp 0.75s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .tagline {
        font-size: 13px;
        font-weight: 300;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 32px;
        animation: fadeUp 0.75s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Input groups ── */
      .input-group {
        margin-bottom: 18px;
        animation: fadeUp 0.75s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .input-group + .input-group {
        animation-delay: 0.3s;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 600;
        color: rgba(200, 215, 255, 0.8);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .input-wrap {
        position: relative;
      }
      .input-wrap .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 15px;
        transition: color 0.25s;
        pointer-events: none;
      }
      .input-wrap input {
        width: 100%;
        padding: 13px 16px 13px 42px;
        background: var(--input-bg);
        border: 1.5px solid var(--input-border);
        border-radius: 12px;
        color: var(--text-primary);
        font-family: "Kantumruy Pro", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.25s,
          background 0.25s,
          box-shadow 0.25s;
        backdrop-filter: blur(6px);
      }
      .input-wrap input::placeholder {
        color: rgba(160, 180, 255, 0.4);
      }
      .input-wrap input:focus {
        border-color: var(--input-focus);
        background: rgba(116, 235, 213, 0.07);
        box-shadow:
          0 0 0 3px rgba(116, 235, 213, 0.12),
          0 0 18px rgba(116, 235, 213, 0.1);
      }
      .input-wrap input:focus ~ .icon {
        color: var(--accent);
      }

      /* Eye toggle */
      .eye-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        transition: color 0.2s;
      }
      .eye-toggle:hover {
        color: var(--accent);
      }

      /* ── Forgot ── */
      .forgot {
        text-align: right;
        margin-top: -10px;
        margin-bottom: 22px;
        font-size: 12px;
        animation: fadeUp 0.75s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .forgot a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .forgot a:hover {
        opacity: 0.7;
      }

      /* ── Submit button ── */
      .login-btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(
          90deg,
          var(--primary) 0%,
          var(--primary-light) 50%,
          var(--accent) 100%
        );
        background-size: 200% 100%;
        background-position: left;
        color: #fff;
        font-family: "Kantumruy Pro", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          background-position 0.4s,
          transform 0.15s,
          box-shadow 0.3s;
        box-shadow:
          0 0 24px var(--primary-glow),
          0 6px 20px rgba(0, 0, 0, 0.3);
        animation: fadeUp 0.75s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .login-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.5s;
      }
      .login-btn:hover {
        background-position: right;
        transform: translateY(-2px);
        box-shadow:
          0 0 36px var(--primary-glow),
          0 10px 28px rgba(0, 0, 0, 0.35);
      }
      .login-btn:hover::after {
        transform: translateX(100%);
      }
      .login-btn:active {
        transform: translateY(1px);
      }
      .login-btn.loading {
        pointer-events: none;
        opacity: 0.8;
      }

      /* Spinner inside button */
      .btn-text,
      .btn-spinner {
        transition: opacity 0.2s;
      }
      .btn-spinner {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
      }
      .login-btn.loading .btn-text {
        opacity: 0;
      }
      .login-btn.loading .btn-spinner {
        display: flex;
      }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0;
        animation: fadeUp 0.75s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .divider span {
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
      }
      .divider p {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* ── Footer ── */
      .footer-links {
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
        animation: fadeUp 0.75s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .footer-links a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
        transition: opacity 0.2s;
      }
      .footer-links a:hover {
        opacity: 0.7;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
        color: #fff;
        padding: 12px 24px;
        border-radius: 40px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.error {
        border-color: rgba(239, 68, 68, 0.5);
        background: rgba(239, 68, 68, 0.15);
      }
      .toast.success {
        border-color: rgba(116, 235, 213, 0.5);
        background: rgba(116, 235, 213, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="drops" id="drops"></div>
    <div class="particles" id="particles"></div>

    <div class="card">
      <div class="logo-wrap">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      </div>

      <h1 class="brand">StudyNest</h1>
      <p class="tagline">សូមចូលប្រើប្រាស់ដើម្បីបន្តការសិក្សា</p>

      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label>ឈ្មោះអ្នកប្រើប្រាស់</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              placeholder="បញ្ចូលឈ្មោះ..."
              required
            />
            <i class="fas fa-user icon"></i>
          </div>
        </div>

        <div class="input-group">
          <label>លេខសម្ងាត់</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <i class="fas fa-lock icon"></i>
            <i class="fas fa-eye eye-toggle" id="eyeToggle"></i>
          </div>
        </div>

        <div class="forgot"><a href="#">ភ្លេចលេខសម្ងាត់?</a></div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">ចូលប្រើប្រាស់</span>
          <span class="btn-spinner"
            ><i class="fas fa-circle-notch fa-spin"></i
          ></span>
        </button>
      </form>

      <div class="divider">
        <span></span>
        <p>ឬ</p>
        <span></span>
      </div>

      <div class="footer-links">
        មិនទាន់មានគណនី? <a href="register.html">ចុះឈ្មោះនៅទីនេះ</a>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      /* ── Rain drops ── */
      const dropContainer = document.getElementById("drops");
      for (let i = 0; i < 45; i++) {
        const d = document.createElement("div");
        d.className = "drop";
        const size = 3 + Math.random() * 5;
        d.style.cssText = `
        left:${Math.random() * 100}vw;
        width:${size}px; height:${size * 2}px;
        opacity:${0.05 + Math.random() * 0.18};
        animation-duration:${5 + Math.random() * 9}s;
        animation-delay:${Math.random() * 9}s;
      `;
        dropContainer.appendChild(d);
      }

      /* ── Floating particles ── */
      const partContainer = document.getElementById("particles");
      const colors = [
        "rgba(79,70,229,0.35)",
        "rgba(116,235,213,0.28)",
        "rgba(159,172,230,0.25)",
      ];
      for (let i = 0; i < 25; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const s = 4 + Math.random() * 10;
        p.style.cssText = `
        left:${Math.random() * 100}vw;
        width:${s}px; height:${s}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration:${8 + Math.random() * 14}s;
        animation-delay:${Math.random() * 12}s;
      `;
        partContainer.appendChild(p);
      }

      /* ── Password toggle ── */
      const passwordInput = document.getElementById("password");
      const eyeToggle = document.getElementById("eyeToggle");
      eyeToggle.addEventListener("click", () => {
        const isPass = passwordInput.type === "password";
        passwordInput.type = isPass ? "text" : "password";
        eyeToggle.className = isPass
          ? "fas fa-eye-slash eye-toggle"
          : "fas fa-eye eye-toggle";
      });

      /* ── Toast helper ── */
      let toastTimer;
      function showToast(msg, type = "") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          t.className = "toast";
        }, 2800);
      }

      /* ── Login form ── */
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const btn = document.getElementById("loginBtn");

          if (!username) {
            showToast("សូមបញ្ចូលឈ្មោះ!", "error");
            return;
          }
          if (!password) {
            showToast("សូមបញ្ចូលលេខសម្ងាត់!", "error");
            return;
          }

          // Loading state
          btn.classList.add("loading");

          setTimeout(() => {
            btn.classList.remove("loading");

            const userGrade = localStorage.getItem("userGrade") || "12";
            localStorage.setItem("currentUserName", username);

            showToast("ចូលប្រើប្រាស់បានជោគជ័យ! 🎉", "success");

            setTimeout(() => {
              window.location.href = `grade${userGrade}/grade${userGrade}_home.html`;
            }, 900);
          }, 1400);
        });
    </script>
  </body>
</html>
