<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade 8 | Home Portal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #047857; /* Emerald Green for Grade 8 */
        --secondary: #10b981;
        --bg: #f0fdf4;
        --white: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Kantumruy Pro", "Poppins", sans-serif;
      }

      body {
        background-color: var(--bg);
        color: #1e293b;
      }

      header {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
        color: white;
        padding: 80px 20px;
        text-align: center;
        border-bottom-left-radius: 60px;
        border-bottom-right-radius: 60px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .logout-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.2);
        padding: 8px 15px;
        border-radius: 10px;
      }

      .container {
        max-width: 1100px;
        margin: -50px auto 50px;
        padding: 0 20px;
      }

      .subject-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
      }

      .subject-card {
        background: var(--white);
        border-radius: 25px;
        padding: 50px 30px;
        text-align: center;
        text-decoration: none;
        color: #1e293b;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        transition: all 0.4s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .subject-card:hover {
        transform: translateY(-15px);
        box-shadow: 0 25px 50px rgba(4, 120, 87, 0.15);
      }

      .icon-box {
        width: 90px;
        height: 90px;
        background: var(--bg);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 25px;
      }

      .subject-card h2 {
        font-size: 1.6rem;
        margin-bottom: 12px;
      }
      .subject-card p {
        color: #64748b;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="logout-btn"
        ><i class="fas fa-power-off"></i> ចាកចេញ</a
      >
      <h1 style="font-size: 2.5rem">មជ្ឈមណ្ឌលសិក្សាថ្នាក់ទី៨</h1>
      <p>ស្វាគមន៍មកកាន់ការសិក្សាថ្នាក់ទី៨ - សូមជ្រើសរើសមុខវិជ្ជា</p>
    </header>

    <div class="container">
      <div class="subject-grid">
        <a href="math_g8/math_g8.html" class="subject-card">
          <div class="icon-box"><i class="fas fa-square-root-alt"></i></div>
          <h2>គណិតវិទ្យា</h2>
          <p>មេរៀនស្វ័យគុណ កន្សោមពីជគណិត និងធរណីមាត្រថ្នាក់ទី៨។</p>
        </a>

        <a href="physics_g8/physics_g8.html" class="subject-card">
          <div class="icon-box"><i class="fas fa-bolt"></i></div>
          <h2>រូបវិទ្យា</h2>
          <p>សិក្សាអំពីកម្លាំង សម្ពាធ និងថាមពលអគ្គិសនី។</p>
        </a>

        <a href="chemistry_g8/chemistry_g8.html" class="subject-card">
          <div class="icon-box"><i class="fas fa-vial"></i></div>
          <h2>គីមីវិទ្យា</h2>
          <p>ស្វែងយល់អំពីអាតូម ម៉ូលេគុល និងប្រតិកម្មគីមីគ្រឹះ។</p>
        </a>
      </div>
    </div>
  </body>
</html>
