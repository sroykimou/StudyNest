<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | StudyNest</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #4f46e5;
        --primary-glow: rgba(79, 70, 229, 0.45);
        --primary-light: #6c63ff;
        --accent: #74ebd5;
        --accent-glow: rgba(116, 235, 213, 0.35);
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.22);
        --input-bg: rgba(255, 255, 255, 0.08);
        --input-border: rgba(255, 255, 255, 0.2);
        --input-focus: rgba(116, 235, 213, 0.75);
        --text-primary: #f0f4ff;
        --text-muted: rgba(210, 220, 255, 0.65);
      }

      body {
        font-family: "Kantumruy Pro", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(ellipse at 25% 35%, #312e81 0%, transparent 55%),
          radial-gradient(ellipse at 75% 65%, #0f766e 0%, transparent 55%),
          linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #134e4a 100%);
      }

      /* ── Rain drops ── */
      .drops {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .drop {
        position: absolute;
        border-radius: 50% 50% 60% 60%;
        background: rgba(116, 235, 213, 0.15);
        animation: fall linear infinite;
      }
      @keyframes fall {
        0% {
          transform: translateY(-20px);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(100vh);
          opacity: 0;
        }
      }

      /* ── Floating particles ── */
      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        animation: drift linear infinite;
        opacity: 0;
      }
      @keyframes drift {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      /* ── Card ── */
      .card {
        position: relative;
        width: 400px;
        padding: 44px 40px 38px;
        border-radius: 28px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(24px) saturate(1.6);
        -webkit-backdrop-filter: blur(24px) saturate(1.6);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 40px 80px rgba(0, 0, 0, 0.55),
          0 0 60px rgba(79, 70, 229, 0.12),
          0 0 60px rgba(116, 235, 213, 0.07);
        animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          transparent 55%
        );
        pointer-events: none;
      }

      /* ── Logo ── */
      .logo-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 16px;
        animation: fadeUp 0.75s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .logo-icon {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--accent) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        color: #fff;
        box-shadow:
          0 0 28px var(--primary-glow),
          0 0 14px var(--accent-glow);
      }

      /* ── Headings ── */
      .brand {
        font-family: "Rajdhani", sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        text-align: center;
        letter-spacing: 1px;
        margin-bottom: 4px;
        animation: fadeUp 0.75s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .tagline {
        font-size: 12.5px;
        font-weight: 300;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 28px;
        animation: fadeUp 0.75s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Progress steps ── */
      .steps {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin-bottom: 26px;
        animation: fadeUp 0.75s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .step-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        transition: all 0.35s;
      }
      .step.active .step-dot {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-color: transparent;
        color: #fff;
        box-shadow: 0 0 12px var(--accent-glow);
      }
      .step.done .step-dot {
        background: var(--accent);
        border-color: transparent;
        color: #0f172a;
      }
      .step-line {
        width: 50px;
        height: 2px;
        background: rgba(255, 255, 255, 0.12);
        transition: background 0.35s;
        margin: 0 4px;
        margin-bottom: 16px;
      }
      .step-line.done {
        background: var(--accent);
      }
      .step-label {
        font-size: 10px;
        color: var(--text-muted);
      }
      .step.active .step-label {
        color: var(--accent);
      }

      /* ── Input groups ── */
      .input-group {
        margin-bottom: 16px;
        animation: fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .input-group:nth-child(1) {
        animation-delay: 0.25s;
      }
      .input-group:nth-child(2) {
        animation-delay: 0.3s;
      }
      .input-group:nth-child(3) {
        animation-delay: 0.35s;
      }
      .input-group:nth-child(4) {
        animation-delay: 0.4s;
      }

      .input-group label {
        display: block;
        margin-bottom: 7px;
        font-size: 11.5px;
        font-weight: 600;
        color: rgba(200, 215, 255, 0.8);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .input-wrap {
        position: relative;
      }
      .input-wrap .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 14px;
        pointer-events: none;
        transition: color 0.25s;
      }
      .input-wrap input,
      .input-wrap select {
        width: 100%;
        padding: 12px 16px 12px 42px;
        background: var(--input-bg);
        border: 1.5px solid var(--input-border);
        border-radius: 12px;
        color: var(--text-primary);
        font-family: "Kantumruy Pro", sans-serif;
        font-size: 13.5px;
        outline: none;
        transition:
          border-color 0.25s,
          background 0.25s,
          box-shadow 0.25s;
        backdrop-filter: blur(6px);
        appearance: none;
        -webkit-appearance: none;
      }
      .input-wrap input::placeholder {
        color: rgba(160, 180, 255, 0.4);
      }
      .input-wrap select {
        cursor: pointer;
      }
      .input-wrap select option {
        background: #1e1b4b;
        color: #e0e7ff;
      }

      /* Custom select arrow */
      .input-wrap .select-arrow {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 11px;
        pointer-events: none;
      }

      .input-wrap input:focus,
      .input-wrap select:focus {
        border-color: var(--input-focus);
        background: rgba(116, 235, 213, 0.07);
        box-shadow:
          0 0 0 3px rgba(116, 235, 213, 0.12),
          0 0 18px rgba(116, 235, 213, 0.1);
      }
      .input-wrap input:focus ~ .icon,
      .input-wrap select:focus ~ .icon {
        color: var(--accent);
      }

      /* Eye toggle */
      .eye-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 13px;
        transition: color 0.2s;
      }
      .eye-toggle:hover {
        color: var(--accent);
      }

      /* Password strength */
      .strength-bar {
        display: flex;
        gap: 4px;
        margin-top: 7px;
      }
      .strength-seg {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.3s;
      }
      .strength-label {
        font-size: 10.5px;
        color: var(--text-muted);
        margin-top: 4px;
        text-align: right;
        min-height: 14px;
      }

      /* ── Submit button ── */
      .reg-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(
          90deg,
          var(--primary) 0%,
          var(--primary-light) 50%,
          var(--accent) 100%
        );
        background-size: 200% 100%;
        background-position: left;
        color: #fff;
        font-family: "Kantumruy Pro", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          background-position 0.4s,
          transform 0.15s,
          box-shadow 0.3s;
        box-shadow:
          0 0 24px var(--primary-glow),
          0 6px 20px rgba(0, 0, 0, 0.3);
        margin-top: 4px;
        animation: fadeUp 0.75s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .reg-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.5s;
      }
      .reg-btn:hover {
        background-position: right;
        transform: translateY(-2px);
        box-shadow:
          0 0 36px var(--primary-glow),
          0 10px 28px rgba(0, 0, 0, 0.35);
      }
      .reg-btn:hover::after {
        transform: translateX(100%);
      }
      .reg-btn:active {
        transform: translateY(1px);
      }
      .reg-btn.loading {
        pointer-events: none;
        opacity: 0.8;
      }
      .btn-text,
      .btn-spinner {
        transition: opacity 0.2s;
      }
      .btn-spinner {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
      }
      .reg-btn.loading .btn-text {
        opacity: 0;
      }
      .reg-btn.loading .btn-spinner {
        display: flex;
      }

      /* ── Footer link ── */
      .login-link {
        display: block;
        margin-top: 20px;
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        animation: fadeUp 0.75s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .login-link b {
        color: var(--accent);
        font-weight: 700;
      }
      .login-link:hover b {
        opacity: 0.75;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(12px);
        color: #fff;
        padding: 12px 24px;
        border-radius: 40px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.error {
        border-color: rgba(239, 68, 68, 0.5);
        background: rgba(239, 68, 68, 0.15);
      }
      .toast.success {
        border-color: rgba(116, 235, 213, 0.5);
        background: rgba(116, 235, 213, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="drops" id="drops"></div>
    <div class="particles" id="particles"></div>

    <div class="card">
      <div class="logo-wrap">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      </div>

      <h1 class="brand">StudyNest</h1>
      <p class="tagline">បង្កើតគណនីរបស់អ្នក — វាឥតគិតថ្លៃ!</p>

      <!-- Progress steps -->
      <div class="steps">
        <div class="step active" id="step1">
          <div class="step-dot">1</div>
          <div class="step-label">ព័ត៌មាន</div>
        </div>
        <div class="step-line" id="line1"></div>
        <div class="step" id="step2">
          <div class="step-dot">2</div>
          <div class="step-label">ថ្នាក់ទី</div>
        </div>
        <div class="step-line" id="line2"></div>
        <div class="step" id="step3">
          <div class="step-dot">3</div>
          <div class="step-label">រួចរាល់</div>
        </div>
      </div>

      <form id="registerForm" autocomplete="off">
        <div class="input-group">
          <label>ឈ្មោះអ្នកប្រើប្រាស់</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              placeholder="បញ្ចូលឈ្មោះ..."
              required
            />
            <i class="fas fa-user icon"></i>
          </div>
        </div>

        <div class="input-group">
          <label>ជ្រើសរើសថ្នាក់ទី</label>
          <div class="input-wrap">
            <select id="gradeSelect" required>
              <option value="" disabled selected>ជ្រើសរើសថ្នាក់...</option>
              <option value="7">ថ្នាក់ទី ៧</option>
              <option value="8">ថ្នាក់ទី ៨</option>
              <option value="9">ថ្នាក់ទី ៩</option>
              <option value="10">ថ្នាក់ទី ១០</option>
              <option value="11">ថ្នាក់ទី ១១</option>
              <option value="12">ថ្នាក់ទី ១២</option>
            </select>
            <i class="fas fa-graduation-cap icon"></i>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>
        </div>

        <div class="input-group">
          <label>លេខសម្ងាត់</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <i class="fas fa-lock icon"></i>
            <i class="fas fa-eye eye-toggle" id="eyeToggle"></i>
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="input-group">
          <label>បញ្ជាក់លេខសម្ងាត់</label>
          <div class="input-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="••••••••"
              required
            />
            <i class="fas fa-shield-alt icon"></i>
            <i class="fas fa-eye eye-toggle" id="eyeToggle2"></i>
          </div>
        </div>

        <button type="submit" class="reg-btn" id="regBtn">
          <span class="btn-text">ចុះឈ្មោះឥឡូវនេះ</span>
          <span class="btn-spinner"
            ><i class="fas fa-circle-notch fa-spin"></i
          ></span>
        </button>
      </form>

      <a href="index.html" class="login-link"
        >មានគណនីរួចហើយ? <b>ចូលប្រើប្រាស់</b></a
      >
    </div>

    <div class="toast" id="toast"></div>

    <script>
      /* ── Rain drops ── */
      const dropContainer = document.getElementById("drops");
      for (let i = 0; i < 45; i++) {
        const d = document.createElement("div");
        d.className = "drop";
        const size = 3 + Math.random() * 5;
        d.style.cssText = `
        left:${Math.random() * 100}vw;
        width:${size}px; height:${size * 2}px;
        opacity:${0.05 + Math.random() * 0.18};
        animation-duration:${5 + Math.random() * 9}s;
        animation-delay:${Math.random() * 9}s;
      `;
        dropContainer.appendChild(d);
      }

      /* ── Particles ── */
      const partContainer = document.getElementById("particles");
      const colors = [
        "rgba(79,70,229,0.35)",
        "rgba(116,235,213,0.28)",
        "rgba(159,172,230,0.25)",
      ];
      for (let i = 0; i < 25; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const s = 4 + Math.random() * 10;
        p.style.cssText = `
        left:${Math.random() * 100}vw;
        width:${s}px; height:${s}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration:${8 + Math.random() * 14}s;
        animation-delay:${Math.random() * 12}s;
      `;
        partContainer.appendChild(p);
      }

      /* ── Password show/hide ── */
      function makeToggle(toggleId, inputId) {
        const toggle = document.getElementById(toggleId);
        const input = document.getElementById(inputId);
        toggle.addEventListener("click", () => {
          const isPass = input.type === "password";
          input.type = isPass ? "text" : "password";
          toggle.className =
            (isPass ? "fas fa-eye-slash" : "fas fa-eye") + " eye-toggle";
          toggle.id = toggleId;
        });
      }
      makeToggle("eyeToggle", "password");
      makeToggle("eyeToggle2", "confirmPassword");

      /* ── Password strength ── */
      const segs = [1, 2, 3, 4].map((n) => document.getElementById("seg" + n));
      const label = document.getElementById("strengthLabel");
      const strengthColors = ["#ef4444", "#f97316", "#eab308", "#74ebd5"];
      const strengthTexts = ["ខ្សោយណាស់", "ខ្សោយ", "ល្អប្រសើរ", "រឹងមាំ"];

      document
        .getElementById("password")
        .addEventListener("input", function () {
          const val = this.value;
          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;

          segs.forEach((s, i) => {
            s.style.background =
              i < score ? strengthColors[score - 1] : "rgba(255,255,255,0.10)";
          });
          label.textContent = val.length ? strengthTexts[score - 1] || "" : "";
          label.style.color = val.length
            ? strengthColors[score - 1]
            : "transparent";

          // Update step indicator
          updateSteps(val.length > 0 ? 2 : 1);
        });

      /* ── Step indicator ── */
      function updateSteps(active) {
        [1, 2, 3].forEach((n) => {
          const s = document.getElementById("step" + n);
          s.classList.remove("active", "done");
          if (n < active) s.classList.add("done");
          if (n === active) s.classList.add("active");
        });
        [1, 2].forEach((n) => {
          const l = document.getElementById("line" + n);
          l.classList.toggle("done", n < active);
        });
      }

      document.getElementById("gradeSelect").addEventListener("change", () => {
        const pw = document.getElementById("password").value;
        updateSteps(pw.length > 0 ? 2 : 2);
      });

      /* ── Toast helper ── */
      let toastTimer;
      function showToast(msg, type = "") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          t.className = "toast";
        }, 3000);
      }

      /* ── Register form ── */
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const grade = document.getElementById("gradeSelect").value;
          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirmPassword").value;
          const btn = document.getElementById("regBtn");

          if (!username) {
            showToast("សូមបញ្ចូលឈ្មោះ!", "error");
            return;
          }
          if (!grade) {
            showToast("សូមជ្រើសរើសថ្នាក់ទី!", "error");
            return;
          }
          if (password.length < 6) {
            showToast("លេខសម្ងាត់ត្រូវមានយ៉ាងហោចណាស់ ៦ អក្សរ!", "error");
            return;
          }
          if (password !== confirm) {
            showToast("លេខសម្ងាត់មិនត្រូវគ្នា!", "error");
            return;
          }

          updateSteps(3);
          btn.classList.add("loading");

          setTimeout(() => {
            btn.classList.remove("loading");
            localStorage.setItem("userGrade", grade);
            localStorage.setItem("currentUserName", username);
            showToast(
              `សូមស្វាគមន៍ ${username}! ការចុះឈ្មោះជោគជ័យ 🎉`,
              "success",
            );
            setTimeout(() => {
              window.location.href = `grade${grade}/grade${grade}_home.html`;
            }, 1100);
          }, 1500);
        });
    </script>
  </body>
</html>
