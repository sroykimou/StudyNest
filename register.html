<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | StudyNest Professional</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-green: #2ecc71;
        --primary-blue: #2a5cff;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #d6e4ff 100%);
        --glass-bg: rgba(255, 255, 255, 0.9);
        --text-dark: #1a202c;
        --text-gray: #718096;
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--bg-gradient);
        position: relative;
        overflow: hidden;
      }

      /* --- Floating Background Shapes --- */
      .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        animation: float 15s infinite alternate;
      }
      .circle-1 {
        width: 400px;
        height: 400px;
        background: rgba(46, 204, 113, 0.2);
        top: -50px;
        left: -50px;
      }
      .circle-2 {
        width: 350px;
        height: 350px;
        background: rgba(42, 92, 255, 0.2);
        bottom: -50px;
        right: -50px;
      }

      @keyframes float {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(60px, 30px);
        }
      }

      /* --- Register Card --- */
      .register-card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        width: 100%;
        max-width: 450px;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.7);
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        margin: 0;
        color: var(--text-dark);
        font-weight: 800;
        letter-spacing: -1px;
      }
      .subtitle {
        color: var(--text-gray);
        margin-bottom: 30px;
        font-size: 0.9rem;
      }

      .form-group {
        text-align: left;
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-gray);
        margin-bottom: 6px;
        margin-left: 5px;
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: 2px solid #edf2f7;
        background: #f8fafc;
        font-size: 1rem;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      select:focus {
        border-color: var(--primary-green);
        background: white;
        box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1);
      }

      /* --- The Action Button --- */
      .btn-register {
        width: 100%;
        padding: 16px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        transition: 0.3s;
        margin-top: 10px;
      }

      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(46, 204, 113, 0.3);
      }

      .footer-text {
        margin-top: 25px;
        font-size: 0.9rem;
        color: var(--text-gray);
      }
      .footer-text a {
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="register-card">
      <div style="font-size: 2.5rem; margin-bottom: 10px">🌟</div>
      <h2>Create Account</h2>
      <p class="subtitle">Join StudyNest to unlock your lessons</p>

      <form id="registerForm">
        <div class="form-group">
          <label>FULL NAME</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your name"
            required
          />
        </div>

        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input
            type="email"
            id="email"
            placeholder="student@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label>WHICH GRADE ARE YOU IN?</label>
          <select id="gradeSelect" required>
            <option value="" disabled selected>Choose your grade</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
          </select>
        </div>

        <div class="form-group">
          <label>PASSWORD</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn-register">Start Learning Now</button>
      </form>

      <div class="footer-text">
        Already have an account? <a href="login.html">Login instead</a>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // This stops the page from refreshing

          // 1. Capture the data the user typed
          const name = document.getElementById("fullName").value;
          const grade = document.getElementById("gradeSelect").value;

          // 2. SAVE to Browser Memory (LocalStorage)
          // This is the "Magic" that connects to the Dashboard
          localStorage.setItem("userName", name);
          localStorage.setItem("userGrade", grade);

          // 3. Success Feedback
          alert(
            "Welcome to StudyNest, " +
              name +
              "! Your Grade " +
              grade +
              " dashboard is ready.",
          );

          // 4. JUMP to the Dashboard automatically
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
